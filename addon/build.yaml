# HA Add-on build configuration
# Specifies the official HA base images for each supported architecture.
# The Supervisor's builder uses these as the BUILD_FROM arg in the Dockerfile.
build_from:
  aarch64: "homeassistant/aarch64-base-python:3.12-alpine3.19"
  amd64: "homeassistant/amd64-base-python:3.12-alpine3.19"
  armv7: "homeassistant/armv7-base-python:3.12-alpine3.19"
