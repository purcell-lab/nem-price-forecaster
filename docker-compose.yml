# NEM Price Forecaster sidecar — one-command bring-up
#
# Usage:
#   docker compose up -d
#
# Configuration:
#   Copy .env.example to .env and edit before running.
#   All SIDECAR_* env vars can also be set in the environment directly.
#
# Volumes:
#   sidecar_data: persists calibration observations + trained models across restarts
#
# HA integration wiring:
#   Set sidecar_url to http://<your-host>:8765 in the config flow
#   (or http://host.docker.internal:8765 if HA runs in Docker on the same host)

services:
  nem-forecaster:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    image: nem-price-forecaster-sidecar:latest
    container_name: nem-price-forecaster
    restart: unless-stopped
    ports:
      - "${SIDECAR_PORT:-8765}:8765"
    environment:
      - SIDECAR_REGION=${SIDECAR_REGION:-NSW1}
      - SIDECAR_PRICE_MODEL=${SIDECAR_PRICE_MODEL:-darts_naive_blend}
      - SIDECAR_FORECAST_HORIZON_HOURS=${SIDECAR_FORECAST_HORIZON_HOURS:-168}
      - SIDECAR_FORECAST_PERIOD_MINUTES=${SIDECAR_FORECAST_PERIOD_MINUTES:-30}
      - SIDECAR_GST_RATE=${SIDECAR_GST_RATE:-0.10}
      - SIDECAR_FIXED_ADDER_PER_KWH=${SIDECAR_FIXED_ADDER_PER_KWH:-0.0}
      - SIDECAR_FEED_IN_IS_WHOLESALE=${SIDECAR_FEED_IN_IS_WHOLESALE:-true}
      - SIDECAR_TOU_BANDS_JSON=${SIDECAR_TOU_BANDS_JSON:-[]}
      - SIDECAR_LOAD_FORECASTER_ENABLED=${SIDECAR_LOAD_FORECASTER_ENABLED:-true}
      - SIDECAR_TRAIN_CRON=${SIDECAR_TRAIN_CRON:-0 2 * * *}
      - SIDECAR_PREDICT_INTERVAL_SECONDS=${SIDECAR_PREDICT_INTERVAL_SECONDS:-300}
      - SIDECAR_DATA_DIR=/data
    volumes:
      - sidecar_data:/data
    # Resource limits: sidecar is idle most of the time (sub-ms HTTP reads);
    # training spikes to ~1 CPU core for ~60s nightly.
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  sidecar_data:
    driver: local
